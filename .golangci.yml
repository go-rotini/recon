version: "2"

linters:
  default: all
  disable:
    # Deprecated
    - wsl

    # Not applicable to this project
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - spancheck
    - zerologlint
    - loggercheck
    - promlinter
    - protogetter
    - ginkgolinter
    - testifylint
    - sloglint
    - unqueryvet
    - arangolint
    - gosmopolitan

    # Too opinionated for a config-loading library
    - exhaustruct
    - varnamelen
    - wsl_v5
    - nlreturn
    - noinlineerr
    - godox
    - depguard
    - goheader
    - gomodguard
    - lll
    - gochecknoglobals    # package-level codec / watcher values are intentional defaults
    - ireturn
    - nonamedreturns
    - paralleltest
    - tparallel
    - testpackage
    - mnd
    - funcorder
    - containedctx        # context flows through registry / Live[T] structs by design
    - tagliatelle         # struct tags use recon-specific + go-rotini family fallback conventions
    - forbidigo
    - exhaustive          # internal kind enums (ValueKind, MergeStrategy, etc.) are intentionally non-exhaustive
    - recvcheck           # value/pointer receiver mixing is the standard marshal/unmarshal pattern

  settings:
    cyclop:
      max-complexity: 25

    gocognit:
      min-complexity: 40

    gocyclo:
      min-complexity: 25

    funlen:
      lines: 120
      statements: 80
      ignore-comments: true

    nestif:
      min-complexity: 10

    goconst:
      min-len: 5
      min-occurrences: 10

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming

    errcheck:
      check-type-assertions: false
      check-blank: true

    gosec:
      excludes:
        - G304        # file paths from user config are by design
        - G115

    nakedret:
      max-func-lines: 10

    misspell:
      locale: US

    interfacebloat:
      max: 6           # RemoteBackend has 5; Source + Watcher + Writer extensions also small

    wrapcheck:
      ignore-interface-regexps:
        - "Source"
        - "Codec"
        - "SchemaValidator"
        - "WatcherFactory"
        - "RemoteBackend"
        - "FlagAdapter"
        - "Unmarshaler"
        - "Marshaler"
        - "io\\.Writer"
      ignore-sig-regexps:
        - "TextUnmarshaler\\)\\.UnmarshalText"
        - "TextMarshaler\\)\\.MarshalText"
        - "io\\.Writer\\)\\.Write"
      ignore-package-globs:
        - "strconv"
        - "encoding/base64"
        - "encoding/hex"

    perfsprint:
      strconcat: false

    godot:
      scope: toplevel

    maintidx:
      under: 15

    prealloc:
      simple: true
      for-loops: true

  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - forcetypeassert
          - dupl
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - goconst
          - maintidx
          - wrapcheck
          - err113
          - exhaustive
          - makezero
          - unparam
          - nestif
          - godot
          - gocritic
          - prealloc
          - perfsprint
          - errorlint
          - inamedparam
          - embeddedstructfieldcheck
          - modernize
          - unconvert
          - revive
          - misspell
          - intrange
          - testableexamples
          - staticcheck
          - tagalign
          - errchkjson

      # Registry / decoder / encoder internals carry inherent complexity (per RECON_PACKAGE_REQUIREMENTS.md §12.5/§4.10).
      - path: registry\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nestif

      - path: registry_bind\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nilnil
          - nilerr
          - nestif

      - path: registry_save\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nestif

      - path: coerce\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - nestif

      - path: precedence\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nestif

      - path: watch\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - nestif

      - path: tags\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - nestif

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
